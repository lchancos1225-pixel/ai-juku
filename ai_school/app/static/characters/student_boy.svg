<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160" aria-label="男子学生 Taro">
  <!--
    AI塾 QRelDo オリジナルキャラクター
    スタイル: シンプル線画 + フラットカラー（黄・青・オレンジ）
    キャラクター名: 男子学生（Taro）
  -->

  <!-- ===== 定数 ===== -->
  <!-- 線: stroke="#1a2744" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" -->
  <!-- 肌色: #ffd4a8 -->
  <!-- 髪色: #3b5ea6（青みがかった黒） -->
  <!-- 制服上: #3b5ea6（濃い青） -->
  <!-- 制服下: #e8edf7（薄い青白） -->
  <!-- アクセント: #f5c842（黄色） -->

  <!-- ===== 影（ソフトドロップシャドウ） ===== -->
  <ellipse cx="60" cy="156" rx="28" ry="5" fill="#d4d8e8" opacity="0.5"/>

