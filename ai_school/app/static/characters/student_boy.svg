  <line x1="100" y1="128" x2="100" y2="142"
    stroke="#1a2744" stroke-width="1.2"/>
  <!-- 本の線 -->
  <line x1="102" y1="131" x2="108" y2="131"
    stroke="#1a2744" stroke-width="1"/>
  <line x1="102" y1="134" x2="108" y2="134"
    stroke="#1a2744" stroke-width="1"/>
  <line x1="102" y1="137" x2="108" y2="137"
