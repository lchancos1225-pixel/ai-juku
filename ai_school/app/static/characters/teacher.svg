<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160" aria-label="先生">
  <!-- 影 -->
  <ellipse cx="60" cy="156" rx="28" ry="5" fill="#d4d8e8" opacity="0.5"/>

  <!-- 首 -->
  <rect x="52" y="72" width="16" height="18" rx="4"
    fill="#ffd4a8" stroke="#1a2744" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="60" cy="50" rx="22" ry="24"
    fill="#ffd4a8" stroke="#1a2744" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 髪（短め・落ち着いた紺グレー） -->
  <path d="M38 46 Q39 26 60 24 Q81 26 82 46"
    fill="#3a3060" stroke="#1a2744" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 前髪 -->
  <path d="M38 46 Q42 32 60 30 Q78 32 82 46"
    fill="#3a3060" stroke="#1a2744" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- サイド -->
  <path d="M38 46 Q36 58 38 62 Q40 58 40 46Z"
    fill="#3a3060" stroke="#1a2744" stroke-width="1.5"
    stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M82 46 Q84 58 82 62 Q80 58 80 46Z"
    fill="#3a3060" stroke="#1a2744" stroke-width="1.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 耳 -->
  <ellipse cx="38" cy="52" rx="4" ry="5"
    fill="#ffd4a8" stroke="#1a2744" stroke-width="1.8"/>
  <path d="M39.5 49.5 Q41 52 39.5 55" fill="none"
    stroke="#1a2744" stroke-width="1.2" stroke-linecap="round"/>
  <ellipse cx="82" cy="52" rx="4" ry="5"
    fill="#ffd4a8" stroke="#1a2744" stroke-width="1.8"/>
  <path d="M80.5 49.5 Q79 52 80.5 55" fill="none"
    stroke="#1a2744" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 眉毛（男性的にやや太め） -->
  <path d="M47 40 Q52 37.5 57 39.5" fill="none"
    stroke="#3a3060" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M63 39.5 Q68 37.5 73 40" fill="none"
    stroke="#3a3060" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 目（やや細め・落ち着いた） -->
  <ellipse cx="52" cy="49" rx="5.5" ry="5"
    fill="#fff" stroke="#1a2744" stroke-width="1.8"/>
  <circle cx="53" cy="49.5" r="3" fill="#1a2744"/>
  <circle cx="54.5" cy="48" r="1.2" fill="#fff"/>

  <ellipse cx="68" cy="49" rx="5.5" ry="5"
    fill="#fff" stroke="#1a2744" stroke-width="1.8"/>
  <circle cx="69" cy="49.5" r="3" fill="#1a2744"/>
  <circle cx="70.5" cy="48" r="1.2" fill="#fff"/>

  <!-- 鼻（少し大きめ） -->
  <path d="M58 57 Q60 62 62 57" fill="none"
    stroke="#1a2744" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="58" cy="59" r="1" fill="#f5c0a0" opacity="0.6"/>
  <circle cx="62" cy="59" r="1" fill="#f5c0a0" opacity="0.6"/>

  <!-- 口（優しい微笑み） -->
  <path d="M52 66 Q60 73 68 66" fill="none"
    stroke="#1a2744" stroke-width="2" stroke-linecap="round"/>
  <!-- 口角ライン -->
  <path d="M52 66 Q54 64 56 65.5" fill="none"
    stroke="#1a2744" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M68 66 Q66 64 64 65.5" fill="none"
    stroke="#1a2744" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ほほ（薄め） -->
  <ellipse cx="43" cy="60" rx="4.5" ry="3" fill="#f5a9a9" opacity="0.35"/>
  <ellipse cx="77" cy="60" rx="4.5" ry="3" fill="#f5a9a9" opacity="0.35"/>

  <!-- ===== 胴体（ジャケット + ネクタイ） ===== -->
  <!-- ジャケット本体 -->
  <path d="M26 88 Q22 128 24 152 L96 152 Q98 128 94 88 Q80 78 60 78 Q40 78 26 88Z"
    fill="#2d5a4f" stroke="#1a2744" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ワイシャツ（ジャケット内） -->
  <path d="M50 80 L55 130 L65 130 L70 80 Q60 76 50 80Z"
    fill="#fff" stroke="#1a2744" stroke-width="1.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ネクタイ -->
  <path d="M57 82 L60 130 L63 82 L61 80 Z"
    fill="#b83c4a" stroke="#1a2744" stroke-width="1.5"
    stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M57.5 84 L60 90 L62.5 84" fill="none"
    stroke="#1a2744" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ズボン -->
  <path d="M24 135 Q22 152 24 154 L56 154 L60 140 L64 154 L96 154 Q98 152 96 135Z"
    fill="#203850" stroke="#1a2744" stroke-width="1.8"
    stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="60" y1="135" x2="60" y2="154" stroke="#1a2744" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 腕（左） -->
  <path d="M26 88 Q14 100 16 122 Q18 134 26 136 Q34 138 38 124 L40 106 L30 92Z"
    fill="#2d5a4f" stroke="#1a2744" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 袖口 -->
  <path d="M16 122 Q17 134 26 136 Q34 137 38 124"
    fill="#fff" stroke="#1a2744" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 手（左） -->
  <ellipse cx="18" cy="140" rx="7.5" ry="5.5"
    fill="#ffd4a8" stroke="#1a2744" stroke-width="1.8" stroke-linecap="round"/>

  <!-- 腕（右）＋タブレット -->
  <path d="M94 88 Q106 100 104 122 Q102 134 94 136 Q86 138 82 124 L80 106 L90 92Z"
    fill="#2d5a4f" stroke="#1a2744" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 袖口 -->
  <path d="M104 122 Q103 134 94 136 Q86 137 82 124"
    fill="#fff" stroke="#1a2744" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 手（右） -->
  <ellipse cx="102" cy="140" rx="7.5" ry="5.5"
    fill="#ffd4a8" stroke="#1a2744" stroke-width="1.8" stroke-linecap="round"/>
  <!-- タブレット/クリップボード -->
  <rect x="86" y="118" width="22" height="28" rx="3"
    fill="#e2e8f4" stroke="#1a2744" stroke-width="2"/>
  <rect x="93" y="115" width="8" height="5" rx="1.5"
    fill="#b0bdd8" stroke="#1a2744" stroke-width="1.5"/>
  <!-- 画面 -->
  <rect x="88" y="121" width="18" height="16" rx="1"
    fill="#fff" stroke="#1a2744" stroke-width="1.2"/>
  <line x1="90" y1="126" x2="104" y2="126" stroke="#3b5ea6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="90" y1="130" x2="104" y2="130" stroke="#3b5ea6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="90" y1="134" x2="98" y2="134" stroke="#3b5ea6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- ボタン -->
  <circle cx="97" cy="142" r="2" fill="#b0bdd8" stroke="#1a2744" stroke-width="1"/>
</svg>
