  <path d="M18 118 Q19 130 26 130 Q32 131 36 120"
    fill="#fff" stroke="#1a2744" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 手（左） -->
  <ellipse cx="20" cy="133" rx="7.5" ry="5.5"
