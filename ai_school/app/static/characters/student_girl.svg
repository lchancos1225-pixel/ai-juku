  <!-- 頬 -->
  <ellipse cx="44" cy="60" rx="5" ry="3.5" fill="#f5a9a9" opacity="0.55"/>
  <ellipse cx="76" cy="60" rx="5" ry="3.5" fill="#f5a9a9" opacity="0.55"/>

  <!-- ===== 胴体（セーラー服風ブレザー） ===== -->
  <!-- 上着 -->
  <path d="M28 88 Q24 128 26 150 L94 150 Q96 128 92 88 Q80 78 60 78 Q40 78 28 88Z"
