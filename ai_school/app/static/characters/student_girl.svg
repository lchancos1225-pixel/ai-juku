  <!-- スカートのプリーツ -->
  <line x1="38" y1="130" x2="35" y2="152" stroke="#1a2744" stroke-width="1" stroke-linecap="round"/>
  <line x1="48" y1="130" x2="46" y2="152" stroke="#1a2744" stroke-width="1" stroke-linecap="round"/>
  <line x1="60" y1="130" x2="60" y2="152" stroke="#1a2744" stroke-width="1" stroke-linecap="round"/>
  <line x1="72" y1="130" x2="74" y2="152" stroke="#1a2744" stroke-width="1" stroke-linecap="round"/>
  <line x1="82" y1="130" x2="85" y2="152" stroke="#1a2744" stroke-width="1" stroke-linecap="round"/>

  <!-- 腕（左） -->
  <path d="M28 88 Q16 98 18 118 Q20 128 26 130 Q32 132 36 120 L38 105 L32 93Z"
