  <!-- 頭（顔ベース） -->
  <ellipse cx="60" cy="50" rx="23" ry="25"
    fill="#ffd4a8" stroke="#1a2744" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 髪（後ろ・長め） -->
  <path d="M37 44 Q34 70 36 90 Q40 98 44 96 Q40 66 40 48Z"
    fill="#e07b3a" stroke="#1a2744" stroke-width="1.8"
