  <rect x="88" y="122" width="18" height="22" rx="2"
    fill="#fff" stroke="#1a2744" stroke-width="1.8"/>
  <rect x="88" y="122" width="4" height="22" rx="1"
    fill="#f5c842" stroke="#1a2744" stroke-width="1.5"/>
  <line x1="94" y1="127" x2="104" y2="127" stroke="#94a3b8" stroke-width="1"/>
  <line x1="94" y1="131" x2="104" y2="131" stroke="#94a3b8" stroke-width="1"/>
  <line x1="94" y1="135" x2="104" y2="135" stroke="#94a3b8" stroke-width="1"/>
  <line x1="94" y1="139" x2="104" y2="139" stroke="#94a3b8" stroke-width="1"/>
</svg>
