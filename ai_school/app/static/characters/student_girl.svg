<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160" aria-label="女子学生 Emma">
  <!-- 影 -->
  <ellipse cx="60" cy="156" rx="28" ry="5" fill="#d4d8e8" opacity="0.5"/>

  <!-- 首 -->
  <rect x="52" y="72" width="16" height="18" rx="4"
