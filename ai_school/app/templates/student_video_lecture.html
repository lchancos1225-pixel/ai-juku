{% extends "base.html" %}
{% block title %}{{ unit.display_name }} | レクチャー{% endblock %}
{% block head %}
<style>
  [x-cloak] { display: none !important; }
  /* スクロールバー非表示 (サムネイルエリア用) */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
<script src="https://unpkg.com/lucide@latest"></script>
{% endblock %}

{% block content %}
<div class="min-h-screen bg-slate-900 text-slate-100 flex flex-col font-sans selection:bg-indigo-500/30"
     x-data="videoLecturePlayer({{ slides_json }})"
     x-init="initPlayer()">
  
  <!-- ヘッダー -->
  <header class="flex-none h-16 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-40 px-4 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <a href="/students/{{ student.student_id }}" class="p-2 rounded-full hover:bg-slate-800 transition-colors text-slate-400 hover:text-white group">
        <i data-lucide="arrow-left" class="w-6 h-6 group-active:-translate-x-1 transition-transform"></i>
      </a>
      <h1 class="text-xl font-bold tracking-tight truncate max-w-md">
        <span class="text-indigo-400 mr-2 text-sm font-medium tracking-normal">UNIT</span>
        {{ unit.display_name }}
      </h1>
    </div>
    
    <div class="flex items-center gap-4">
      <div class="text-sm text-slate-400 font-medium" x-text="formatTime(currentTime) + ' / ' + formatTime(duration)"></div>
      <button class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-medium rounded-xl shadow-lg shadow-indigo-500/20 transition-all flex items-center gap-2"
              @click="finishLecture">
        <span>演習へ進む</span>
        <i data-lucide="chevron-right" class="w-4 h-4"></i>
      </button>
    </div>
  </header>

  <!-- メインコンテンツ (2ペイン・ランドスケープ) -->
  <main class="flex-1 overflow-hidden p-4 lg:p-6 flex flex-col lg:flex-row gap-6">
    
    <!-- 左ペイン: 動画プレイヤー -->
    <div class="flex-1 flex flex-col relative rounded-2xl overflow-hidden bg-black shadow-2xl ring-1 ring-slate-800 lg:max-w-[50%]">
      <!-- HTML5 Video Element (Mock source, ideally from DB) -->
      <video x-ref="videoEl" 
             class="w-full h-full object-cover" 
             playsinline
             preload="metadata"
             src="https://www.w3schools.com/html/mov_bbb.mp4">
      </video>

      <!-- オーバーレイ コントロール (タブレットの指操作に最適化した大きなボタン) -->
      <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-transparent to-transparent flex flex-col justify-end p-6 opacity-0 hover:opacity-100 transition-opacity duration-300 group"
           :class="{'opacity-100': !isPlaying}">
        
        <!-- シークバー -->
        <div class="w-full h-2 bg-slate-700/50 rounded-full mb-6 cursor-pointer overflow-hidden relative"
             @click="seekFromBar($event)">
          <div class="absolute top-0 left-0 h-full bg-indigo-500" 
               :style="`width: ${(currentTime / duration) * 100}%`"></div>
        </div>

        <div class="flex items-center justify-center gap-8 lg:gap-12 pb-2">
          <!-- 10秒戻る -->
          <button @click.stop="skip(-10)" class="p-4 rounded-full bg-white/10 backdrop-blur-sm hover:bg-white/20 active:scale-95 transition-all text-white">
            <i data-lucide="rewind" class="w-8 h-8"></i>
          </button>
          
          <!-- 再生/一時停止 -->
          <button @click.stop="togglePlay()" class="p-6 rounded-full bg-indigo-600 hover:bg-indigo-500 active:scale-95 shadow-lg shadow-indigo-500/30 transition-all text-white">
            <i data-lucide="play" class="w-10 h-10 ml-1" x-show="!isPlaying"></i>
            <i data-lucide="pause" class="w-10 h-10" x-show="isPlaying" x-cloak></i>
          </button>
          
          <!-- 10秒進む -->
          <button @click.stop="skip(10)" class="p-4 rounded-full bg-white/10 backdrop-blur-sm hover:bg-white/20 active:scale-95 transition-all text-white">
            <i data-lucide="fast-forward" class="w-8 h-8"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- 右ペイン: スライド表示エリア -->
    <div class="flex-1 relative rounded-2xl overflow-hidden bg-slate-800 flex items-center justify-center shadow-xl ring-1 ring-slate-700/50 isolate group">
      <!-- 背景装飾 -->
      <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/5 to-purple-500/5"></div>
      
      <!-- メモ機能用ステート表示（将来拡張の布石） -->
      <div class="absolute top-4 right-4 z-10">
        <button class="p-3 rounded-xl bg-slate-900/50 hover:bg-slate-800 backdrop-blur border border-slate-700 text-slate-300 hover:text-white transition-colors flex items-center gap-2"
                title="メモを追加 (開発中)">
          <i data-lucide="pen-line" class="w-5 h-5"></i>
          <span class="text-sm font-medium hidden sm:inline">メモ</span>
        </button>
      </div>

      <template x-for="slide in slides" :key="slide.id"> :key="slide.id">
        <!-- Alpine.js x-transition による滑らかなフェード (紙芝居的) -->
        <img :src="slide.image_url" 
             x-show="currentSlide && currentSlide.id === slide.id"
             x-transition:enter="transition ease-out duration-500"
             x-transition:enter-start="opacity-0 translate-y-2 scale-[0.98]"
             x-transition:enter-end="opacity-100 translate-y-0 scale-100"
             x-transition:leave="transition ease-in duration-300 absolute inset-0"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="w-full h-full object-contain p-4 drop-shadow-2xl max-w-full max-h-full"
             alt="Lecture Slide" />
      </template>

      <!-- スライドがない場合のプレースホルダー -->
      <div x-show="!currentSlide" class="text-slate-500 flex flex-col items-center gap-4">
        <i data-lucide="image" class="w-12 h-12 opacity-50"></i>
        <p>スライドを読み込み中...</p>
      </div>
    </div>
  </main>

  <!-- サムネイルタイムライン (画面下部) -->
  <footer class="flex-none h-36 bg-slate-900/50 border-t border-slate-800 p-4">
    <div class="h-full flex gap-4 overflow-x-auto no-scrollbar items-center snap-x snap-mandatory px-4 lg:px-8">
      <template x-for="(slide, index) in slides" :key="slide.id">
        <button @click="seekToSlide(slide)" 
                class="relative h-full aspect-video flex-none rounded-xl overflow-hidden ring-2 transition-all duration-300 snap-center group focus:outline-none focus-visible:ring-indigo-400"
                :class="currentSlide && currentSlide.id === slide.id ? 'ring-indigo-500 scale-105 shadow-lg shadow-indigo-500/20' : 'ring-slate-700/50 hover:ring-slate-500 opacity-60 hover:opacity-100'">
          <img :src="slide.thumbnail" class="w-full h-full object-cover group-active:scale-105 transition-transform duration-500" alt="Thumbnail" />
          
          <!-- アクティブインジケーター -->
          <div class="absolute inset-0 bg-indigo-500/20" x-show="currentSlide && currentSlide.id === slide.id"></div>
          
          <!-- タイムスタンプバッジ -->
          <div class="absolute bottom-2 right-2 bg-slate-900/80 backdrop-blur-sm text-xs font-mono px-2 py-1 rounded-md text-slate-300">
            <span x-text="formatTime(slide.start_time)"></span>
          </div>
        </button>
      </template>
    </div>
  </footer>

</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('videoLecturePlayer', (slidesData) => ({
    video: null,
    isPlaying: false,
    currentTime: 0,
    duration: 0,
    slides: slidesData || [],
    currentSlide: null,
    
    initPlayer() {
      lucide.createIcons();
      this.video = this.$refs.videoEl;
      
      if (this.slides.length > 0) {
        this.currentSlide = this.slides[0];
      }

      // timeupdateでスライド同期
      this.video.addEventListener('timeupdate', () => {
        this.currentTime = this.video.currentTime;
        this.syncSlide();
      });

      this.video.addEventListener('loadedmetadata', () => {
        this.duration = this.video.duration;
      });

      this.video.addEventListener('play', () => this.isPlaying = true);
      this.video.addEventListener('pause', () => this.isPlaying = false);
    },
    
    syncSlide() {
      // 現在のcurrentTimeがstart_timeとend_timeの間に収まるスライドを検索
      // 見つからない場合は、直前のスライドを維持するなどのフォールバック
      const slide = this.slides.find(s => this.currentTime >= s.start_time && this.currentTime < s.end_time);
      
      // 末尾超過の場合は最後のスライド
      const targetSlide = slide || (this.currentTime >= this.slides[this.slides.length - 1]?.end_time ? this.slides[this.slides.length - 1] : this.currentSlide);
      
      if (targetSlide && (!this.currentSlide || targetSlide.id !== this.currentSlide.id)) {
        this.currentSlide = targetSlide;
      }
    },
    
    togglePlay() {
      if (this.video.paused) {
        this.video.play();
      } else {
        this.video.pause();
      }
    },
    
    skip(amount) {
      this.video.currentTime = Math.max(0, Math.min(this.video.currentTime + amount, this.duration));
    },
    
    seekFromBar(event) {
      const rect = event.currentTarget.getBoundingClientRect();
      const pos = (event.clientX - rect.left) / rect.width;
      this.video.currentTime = pos * this.duration;
    },
    
    seekToSlide(slide) {
      this.video.currentTime = slide.start_time;
      if (this.video.paused) {
        this.video.play();
      }
    },
    
    formatTime(seconds) {
      if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    },

    finishLecture() {
      // 将来的に `problem_service` へのリダイレクトや完了API呼び出しを実装
      window.location.href = `/students/{{ student.student_id }}`;
    }
  }))
});
</script>
{% endblock %}
