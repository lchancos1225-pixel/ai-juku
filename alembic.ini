# Alembic configuration for ai_school.
#
# The DB URL is read from the environment variable AI_SCHOOL_DB_URL via
# alembic/env.py so the same configuration works in dev, CI, and production
# without secrets in this file.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
timezone = UTC

# sqlalchemy.url is intentionally left blank; env.py resolves it at runtime.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
